{% extends "base.html" %}
{% load static %}

{% block title %}Lookbook — КАПЛИНК{% endblock %}

{% block content %}
<section class="lookbook-list-page">
    <h1 class="page-title">LOOKBOOK</h1>
    <p class="page-subtitle">Вдохновляющие образы от стилиста</p>
    
    <div class="lookbook-preview-grid">
        {% for look in lookbooks %}
        <a href="{{ look.get_absolute_url }}" class="lookbook-preview-card">
            <img src="{{ look.image.url }}" alt="{{ look.name }}" class="lookbook-preview-image">
            <span class="lookbook-preview-name">{{ look.name }}</span>
        </a>
        {% empty %}
        <p class="no-lookbooks">Нет образов. Добавьте их в админ-панели.</p>
        {% endfor %}
    </div>
</section>
{% endblock %}
